name: Auto-merge agent PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: contains(github.event.pull_request.labels.*.name, 'agent-update')
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
